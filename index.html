          class="hidden bg-red-950/30 h-12 border border-red-500/30 text-red-400 text-sm font-medium px-4 py-3 rounded-lg text-center tracking-tight"
        >
          City not found. Please try again

        <div
          id="location-denied"
          class="hidden bg-red-950/30 h-12 border border-red-500/30 text-red-400 text-sm font-medium px-4 py-3 rounded-lg text-center tracking-tight"
        >
          Location access denied
        </div>
      </section>

      <header class="w-full">
        <form id="weather-form" class="flex gap-2">

            type="text"
            id="search-input"
            placeholder="Search city name..."
            autocomplete="off"
            class="w-full bg-[#1A1A1E] text-white border border-[#2D2D34] rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-[#3B82F6] transition-colors placeholder-[#64748B]"
          />
          <button
            type="submit"
            class="bg-[#3B82F6] hover:bg-[#2563EB] text-white font-medium text-sm px-5 py-3 rounded-lg transition-colors tracking-wide"
          >
            Search
          </button>
        </form>
      </header>
