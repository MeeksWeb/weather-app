    <title>Weather App</title>

  <body
    class="bg-[#121214] text-[#E2E8F0] min-h-screen flex flex-col items-center justify-center p-6 font-sans"

    <section>
      <div id="loader" class="loader-container hidden">
        <div class="spinner"></div>
      </div>
      <main
        id="main-content"
        class="w-full max-w-md mx-auto flex flex-col gap-4"
      >
        <section id="no-result">
          <div
            id="error-message"
            class="hidden bg-red-950/30 h-12 border border-red-500/30 text-red-400 text-sm font-medium px-4 py-3 rounded-lg text-center tracking-tight"
          >
            City not found. Please try again
          </div>

          <div
            id="location-denied"
            class="hidden bg-red-950/30 h-12 border border-red-500/30 text-red-400 text-sm font-medium px-4 py-3 rounded-lg text-center tracking-tight"
          >
            Location access denied
          </div>
        </section>
        <h1 class="text-3xl font-bold text-center">Weather App</h1>
        <header class="w-full">
          <form id="weather-form" class="flex gap-2">
            <input
              type="text"
              id="search-input"
              placeholder="Search city name..."
              autocomplete="off"
              class="w-full bg-[#1A1A1E] text-white border border-[#2D2D34] rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-[#3B82F6] transition-colors placeholder-[#64748B]"
            />
            <button
              type="submit"
              class="bg-[#3B82F6] hover:bg-[#2563EB] text-white font-medium text-sm px-5 py-3 rounded-lg transition-colors tracking-wide"
            >
              Search
            </button>
          </form>
        </header>

        <section
          id="weather-display"
          class=" hidden bg-[#1A1A1E] border border-[#2D2D34] rounded-2xl p-6 flex flex-col items-center text-center shadow-xl"
        >
